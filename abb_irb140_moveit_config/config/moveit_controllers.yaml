# Configuración para que MoveIt sepa hablar con ros2_control
moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - manipulator_controller

  manipulator_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    # --- AÑADE ESTO DEBAJO (respeta los espacios a la izquierda) ---
    allowed_execution_duration_scaling: 5.0
    allowed_goal_duration_margin: 20.0
    allowed_start_tolerance: 0.0
